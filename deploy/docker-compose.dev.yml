# 数境空间官网 本地开发编排（仅启动 PostgreSQL 供后端开发使用）
# 用法（在仓库根目录执行）：
#   docker compose -f deploy/docker-compose.dev.yml up -d
#   docker compose -f deploy/docker-compose.dev.yml down       # 停止（保留数据）
#   docker compose -f deploy/docker-compose.dev.yml down -v     # 停止并清空数据卷
#
# 说明：
# - 仅监听 127.0.0.1，不对公网暴露。
# - 数据持久化到命名卷 pg_data。
# - 生产编排（web/api/db 全量、网络隔离）见「开发顺序第 11 步」，单独提供 docker-compose.prod.yml。

services:
  db:
    image: postgres:16
    container_name: shujing-pg-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shujing_dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shujing_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
