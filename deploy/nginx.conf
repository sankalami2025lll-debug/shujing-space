# =============================================================================
# 数境空间（Shujing Space）Nginx / OpenResty 反向代理配置模板
# 部署位置：/etc/nginx/conf.d/shujing-space.conf
# 假设：
#   - 前端 Next.js 在 localhost:3000
#   - 后端 NestJS 在 localhost:4000
#   - 站点域名使用 your-domain.com 占位；上线时替换为正式域名
#   - SSL 证书路径使用 Let's Encrypt 占位路径；上线时替换为正式证书路径
#   - 对象存储直连阿里云 OSS（不走反代）
# =============================================================================

upstream frontend {
    server 127.0.0.1:3000;
}

upstream backend {
    server 127.0.0.1:4000;
}

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # --- SSL 证书（Let's Encrypt / Certbot） ---
    # 上线时请替换为正式域名对应的证书路径
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- 静态资源缓存（前端构建产物） ---
    location /_next/static {
        proxy_pass http://frontend;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /favicon.ico {
        proxy_pass http://frontend;
        expires 30d;
    }

    # --- API 后端反向代理 ---
    # Next.js 生产模式下 /api/* 由 Nginx 转发到后端 NestJS
    # 重要：不要在 next.config.ts 中写死 production rewrite，
    #       反代层处理才是标准做法
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # OSS 直传 presign 和 callback 可能大文件，不限制 body
        client_max_body_size 200m;
    }

    # --- 前端页面 ---
    # 非静态 / 非 API 的请求全部交给 Next.js
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js 需要 WebSocket 支持热更新 / HMR
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
